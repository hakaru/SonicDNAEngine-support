title: SonicDNA Engine Support
description: Support page for SonicDNA Engine - IR/NAM Audio Processor & AUv3 Plugin for iOS
theme: jekyll-theme-minimal
future: true

collections:
  posts_en:
    output: true
    permalink: /blog/en/:name/
  posts_ja:
    output: true
    permalink: /blog/ja/:name/

defaults:
  - scope:
      type: posts_en
    values:
      layout: article
      lang: en
  - scope:
      type: posts_ja
    values:
      layout: article
      lang: ja
